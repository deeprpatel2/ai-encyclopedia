name: Update Knowledge Base

on:
  push:
    paths:
      - 'sources.json'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Process pending sources
        run: node scripts/process-sources.js

      - name: Rebuild knowledge index
        run: node scripts/build-index.js

      - name: Commit changes
        run: |
          git config user.name "AI Knowledge Bot"
          git config user.email "bot@aiknowledgebase.dev"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-update: process new sources and rebuild index"
          git push
